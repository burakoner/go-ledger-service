services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: go-ledger-api
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      DATABASE_URL: "postgres://ledger:ledger@postgres:5432/ledger?sslmode=disable"
      REDIS_ADDR: "redis:6379"
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:17-alpine
    container_name: go-ledger-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ledger
      POSTGRES_USER: ledger
      POSTGRES_PASSWORD: ledger
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:8-alpine
    container_name: go-ledger-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
