services:
  ledger-api:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_PATH: ./cmd/ledger-api
    container_name: go-ledger-api
    restart: unless-stopped
    ports:
      - ${LEDGER_API_PORT:-8080}:${LEDGER_API_PORT:-8080}
    environment:
      PORT: ${LEDGER_API_PORT:-8080}
      DATABASE_URL: "postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable"
      REDIS_ADDR: "redis:6379"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - ledger-net

  ledger-admin:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_PATH: ./cmd/ledger-admin
    container_name: go-ledger-admin
    restart: unless-stopped
    ports:
      - ${LEDGER_ADMIN_PORT:-8090}:${LEDGER_ADMIN_PORT:-8090}
    environment:
      PORT: ${LEDGER_ADMIN_PORT:-8090}
      DATABASE_URL: "postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable"
      TENANT_ADMIN_KEY: ${TENANT_ADMIN_KEY:-WX5TczRsQnCk7k8k9AXbsW5czRsQnCkg}
      TENANT_SCHEMA_MIGRATION_PATH: "migrations/0002_init_tenant_schema.sql"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:8090/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - ledger-net

  ledger-worker:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_PATH: ./cmd/ledger-worker
    container_name: go-ledger-worker
    environment:
      DATABASE_URL: "postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable"
      WORKER_COUNT: "${WORKER_COUNT:-2}"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ledger-net

  webhook-receiver:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_PATH: ./cmd/webhook-receiver
    container_name: go-ledger-webhook-receiver
    restart: unless-stopped
    ports:
      - ${WEBHOOK_RECEIVER_PORT:-8088}:${WEBHOOK_RECEIVER_PORT:-8088}
    environment:
      WEBHOOK_RECEIVER_PORT: ${WEBHOOK_RECEIVER_PORT:-8088}
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:${WEBHOOK_RECEIVER_PORT:-8088}/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - ledger-net

  postgres:
    image: postgres:18.3-alpine
    container_name: go-ledger-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ledger}
      POSTGRES_USER: ${POSTGRES_USER:-ledger}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-StrongPa55word123!}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-ledger} -d ${POSTGRES_DB:-ledger} -h localhost -p 5432",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Run public migration automatically on first DB initialization.
      - ./migrations/0001_init_public.sql:/docker-entrypoint-initdb.d/0001_init_public.sql:ro
    networks:
      - ledger-net

  redis:
    image: redis:8-alpine
    container_name: go-ledger-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - redis_data:/data
    networks:
      - ledger-net

volumes:
  postgres_data:
  redis_data:

networks:
  ledger-net:
